<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLEUR NOIRE</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@200;300&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #E8F4FF; font-family: 'Montserrat', sans-serif; }
    .hero {
      min-height: 100vh; display: flex; justify-content: center; align-items: center;
      background: radial-gradient(circle at center, #001a33 0%, #000000 70%);
      text-align: center; padding: 20px;
    }
    .logo {
      width: 280px; max-width: 80vw; border-radius: 15px;
      box-shadow: 0 0 40px rgba(88, 166, 255, 0.5);
      margin-bottom: 30px;
    }
    .tagline {
      font-family: 'Cormorant Garamond', serif; color: #58a6ff;
      letter-spacing: 4px; font-size: 14px; margin-bottom: 40px;
    }
    .btn {
      border: 1px solid #58a6ff; padding: 14px 45px; color: #E8F4FF;
      text-decoration: none; letter-spacing: 3px; font-size: 12px;
    }
    .btn:hover { background: #58a6ff; color: #000; }
  </style>
</head>
<body>
  <section class="hero">
    <div>
      <img src="logo-fleur-noire.jpeg" alt="Fleur Noire" class="logo">
      <p class="tagline">LA ELEGANCIA NACE EN LA SOMBRA</p>
      <a href="#drop" class="btn">DROP NOIR 01</a>
    </div>
  </section>
</body>
</html>
