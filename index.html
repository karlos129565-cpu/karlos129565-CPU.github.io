<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLEUR NOIRE</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Montserrat:wght@200;300&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #E8F4FF; font-family: 'Montserrat', sans-serif; }
    .hero {
      min-height: 100vh; display: flex; justify-content: center; align-items: center;
      background: radial-gradient(circle at center, #001a33 0%, #000000 70%);
      text-align: center; padding: 20px;
    }
   .Logotipo {
  .Logotipo {
  width: 320px;
  max-width: 85vw;
  height: auto;
  border-radius: 20px;
  border: 1px solid #58a6ff;
  box-shadow: 0 0 35px rgba(88, 166, 255, 0.7);
  margin-bottom: 30px;



 @keyframes pulse {
  0%, 100% { box-shadow: 0 0 30px rgba(88, 166, 255, 0.4), inset 0 0 20px rgba(88, 166, 255, 0.2); }
  50% { box-shadow: 0 0 50px rgba(88, 166, 255, 0.8), inset 0 0 30px rgba(88, 166, 255, 0.4); }
}
  50% { box-shadow: 0 0 50px rgba(88, 166, 255, 0.8), inset 0 0 30px rgba(88, 166, 255, 0.4); }
}
    .tagline {
      font-family: 'Cormorant Garamond', serif; color: #58a6ff;
      letter-spacing: 4px; font-size: 14px; margin-bottom: 40px;
      text-shadow: 0 0 10px rgba(88, 166, 255, 0.5);
    }
    .btn {
      border: 1px solid #58a6ff; padding: 14px 45px; color: #E8F4FF;
      text-decoration: none; letter-spacing: 3px; font-size: 12px;
      transition: 0.4s; box-shadow: 0 0 15px rgba(88, 166, 255, 0.2);
    }
    .btn:hover { background: #58a6ff; color: #000; }
  </style>
</head>
<body>
  <section class="hero">
    <div>
      <img src="./fleur-noire.jpeg" alt="Fleur Noire" class="logo">
      <p class="tagline">LA ELEGANCIA NACE EN LA SOMBRA</p>
      <a href="#drop" class="btn">DROP NOIR 01</a>
    </div>
  </section>
</body>
</html>
