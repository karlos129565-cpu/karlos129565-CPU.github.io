         <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            color: #EBF4FF; 
            font-family: 'Montserrat', sans-serif; 
            text-align: center;
            padding: 40px 20px;
        }
        h1 { 
            font-family: 'Cormorant Garamond', serif;
            color: #58aeff; 
            font-size: 40px;
            margin-bottom: 50px;
            letter-spacing: 4px;
        }
        .grid-marcas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .marca {
            border: 1px solid #58aeff;
            padding: 20px;
            transition: 0.4s;
        }
        .marca:hover {
            box-shadow: 0 0 30px rgba(88, 166, 255, 0.6);
            transform: scale(1.05);
        }
        .marca img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            margin-bottom: 15px;
        }
        .modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.9);
  backdrop-filter: blur(5px);
}

.modal-contenido {
  background-color: #0a0a0a;
  margin: 5% auto;
  padding: 30px;
  border: 2px solid #4da6ff;
  border-radius: 10px;
  width: 80%;
  max-width: 600px;
  text-align: center;
  animation: aparecer 0.3s;
}

@keyframes aparecer {
  from {opacity: 0; transform: scale(0.7);}
  to {opacity: 1; transform: scale(1);}
}

.modal-contenido img {
  max-width: 200px;
  margin-bottom: 20px;
}

.modal-contenido h2 {
  color: #4da6ff;
  margin-bottom: 15px;
}

.modal-contenido p {
  color: #ccc;
  line-height: 1.6;
}

.cerrar {
  color: #4da6ff;
  float: right;
  font-size: 35px;
  font-weight: bold;
  cursor: pointer;
}

.cerrar:hover { color: #fff; }
.marca { cursor: pointer; }
  .btn-volver {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
  background-color: #0a0a0a; 
  color: #4da6ff;
  text-decoration: none;
  border: 1px solid #4da6ff;
  border-radius: 5px;
  font-size: 24px;
  transition: all 0.3s ease;
  width: 60px;
  height: 50px;
  over-flow: visble;
}

.btn-volver .flecha {
  display: inline-block;
  transform: scaleX(3);
  transform-origin: center;
}

.btn-volver:hover {
  background: #58aeff;
  color: #111;
  transform: translateX(-5px);
}

.btn-volver:hover {
    background: #58aeff;

<!-- MODAL PARA LA INFO -->
<div id="modalMarca" class="modal">
  <div class="modal-contenido">
    <span class="cerrar">&times;</span>
    <img id="modalImg" src="" alt="">
    <h2 id="modalTitulo"></h2>

<script src="marcas-data.js"></script>
<script>
const tarjetas = document.querySelectorAll('.marca');
const modal = document.getElementById('modalMarca');
const cerrar = document.querySelector('.cerrar');

tarjetas.forEach(tarjeta => {
  tarjeta.addEventListener('click', () => {
    const nombreMarca = tarjeta.querySelector('p').textContent.trim();
    if(infoMarcas[nombreMarca]) {
      document.getElementById('modalImg').src = infoMarcas[nombreMarca].img;
      document.getElementById('modalTitulo').textContent = nombreMarca;
      document.getElementById('modalDescripcion').textContent = infoMarcas[nombreMarca].descripcion;
      modal.style.display = 'block';
    }
  });
});

cerrar.onclick = () => modal.style.display = 'none';
window.onclick = (event) => {
  if (event.target == modal) modal.style.display = 'none';
}
<script src="marcas-data.js"></script>
<script>
function abrirModal(marca) {
    const data = infoMarcas[marca];
    if(!data) {
        console.log('No existe:', marca);
        return;
    }
    document.getElementById('modal-img').src = data.img;
    document.getElementById('modal-texto').innerText = data.descripcion;
    document.getElementById('modal').style.display = 'block';
}

function cerrarModal() {
    document.getElementById('modal').style.display = 'none';
}
</script>
